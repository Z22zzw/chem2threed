<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChemScene Agent - 化学3D教学建模智能体</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="app">
  <header class="header">
    <div class="header-left">
      <h1>ChemScene Agent</h1>
      <span class="subtitle">化学3D教学建模智能体</span>
    </div>
    <div class="header-right">
      <button id="btn-history" class="btn btn-ghost">历史记录</button>
    </div>
  </header>

  <main class="main">
    <div class="chat-panel">
      <div class="messages" id="messages">
        <div class="msg assistant">
          <div class="msg-avatar">AI</div>
          <div class="msg-content">
            <p>你好！我是化学3D教学建模智能体。告诉我你想展示什么化学概念，我会帮你生成可交互的3D模型网页。</p>
            <p class="hint">例如：<em>"甲烷的分子结构"、"乙烯的加成反应"、"氯化钠的晶体结构"</em></p>
          </div>
        </div>
      </div>

      <div class="attachments" id="attachments"></div>

      <div class="input-area">
        <div class="input-row">
          <button class="btn-icon" id="btn-upload" title="上传文件">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <input type="file" id="file-input" hidden multiple accept=".txt,.md,.json,.pdf,.docx,.csv,.png,.jpg,.jpeg,.gif,.bmp,.webp">
          <textarea id="input" placeholder="描述你想建模的化学概念..." rows="1"></textarea>
          <button class="btn btn-primary" id="btn-send">发送</button>
        </div>
      </div>
    </div>

    <div class="side-panel" id="side-panel">
      <div class="side-placeholder" id="side-placeholder">
        <div class="placeholder-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <p>生成的3D模型将在此预览</p>
        <p class="hint">或点击部署后的访问链接在浏览器全屏查看</p>
      </div>
      <div class="preview-container" id="preview-container" style="display:none;">
        <iframe id="preview-frame" frameborder="0"></iframe>
        <div class="preview-actions">
          <a id="preview-link" href="#" target="_blank" class="btn btn-ghost btn-sm">新窗口打开</a>
          <button id="btn-fullscreen" class="btn btn-ghost btn-sm">全屏</button>
        </div>
      </div>
      <div class="deploy-result" id="deploy-result" style="display:none;">
        <div class="result-card">
          <h3>部署完成</h3>
          <p>3D模型已部署到公网，可在课堂直接打开：</p>
          <a id="deploy-url" href="#" target="_blank" class="deploy-link"></a>
          <button class="btn btn-primary btn-sm" id="btn-copy-url">复制链接</button>
        </div>
      </div>
    </div>
  </main>

  <div class="status-bar" id="status-bar">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">就绪</span>
  </div>
</div>

<div class="modal" id="history-modal" style="display:none;">
  <div class="modal-content">
    <div class="modal-header">
      <h2>历史记录</h2>
      <button class="btn-icon" id="btn-close-history">&times;</button>
    </div>
    <div class="modal-body" id="history-list"></div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
